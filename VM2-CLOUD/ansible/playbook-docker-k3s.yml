- name: Setup Docker & K8s
  hosts: vm2_cloud
  become: true
  vars:
    k3s_version: "v1.30.3+k3s1"

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install basic utilities
      apt:
        name:
          - git
          - curl
          - ca-certificates
          - gnupg
          - lsb-release
          - openssh-client
          - apt-transport-https
          - software-properties-common
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker Engine + Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Enable and start Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group 
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes 

    - name: Verify Docker version 
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Verify Docker Compose version
      command: docker compose version
      register: compose_version
      changed_when: false      

    - name: Display installed versions
      debug:
        msg:
          - "Docker: {{ docker_version.stdout }}"
          - "Docker Compose: {{ compose_version.stdout }}"

    - name: Install K3s
      shell: curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Get K3s token (for agents - optional)
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Set kubectl config locally (so your CD can use it)
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: ./kubeconfig.yaml
        flat: yes