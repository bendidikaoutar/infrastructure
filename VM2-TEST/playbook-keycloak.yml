- name: Deploy Keycloak
  hosts: devsecops
  become: yes

  vars:
    remote_dir: /opt/keycloak

  tasks:

    - name: Create directory
      file:
        path: "{{ remote_dir }}"
        state: directory

    - name: Copy docker-compose
      copy:
        src: docker/docker-compose-keycloak.yml
        dest: "{{ remote_dir }}/docker-compose.yml"

    - name: Start Keycloak
      command: docker compose up -d
      args:
        chdir: "{{ remote_dir }}"
