version: '3.8'

services:

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube_db
      SONAR_JDBC_USERNAME: chaimae
      SONAR_JDBC_PASSWORD: chaimae1702
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"

    ports:
      - "9000:9000"

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

    networks:
      - app_network

volumes:
  sonarqube_data:
  sonarqube_logs:

networks:
  app_network:
    external: true

