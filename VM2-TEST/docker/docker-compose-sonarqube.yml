version: '3.8'

services:

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: always

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonarqube_db
      SONAR_JDBC_USERNAME: chaimae
      SONAR_JDBC_PASSWORD: chaimae1702
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      # Keycloak SAML SSO
      SONAR_AUTH_SAML_ENABLED: "true"
      SONAR_AUTH_SAML_APPLICATIONID: "sonarqube"
      SONAR_AUTH_SAML_PROVIDERNAME: "Keycloak"
      SONAR_AUTH_SAML_PROVIDERID: "http://100.124.103.20:8081/realms/projet-portfolio"
      SONAR_AUTH_SAML_LOGINURL: "http://100.124.103.20:8081/realms/projet-portfolio/protocol/saml"
      SONAR_AUTH_SAML_USERNAMEATTRIBUTE: "preferred_username"
      SONAR_AUTH_SAML_USEREMAILATTRIBUTE: "email"
      SONAR_AUTH_SAML_GROUPSATTRIBUTE: "groups"
      SONAR_AUTH_SAML_CERTIFICATE: ""

    ports:
      - "9000:9000"

    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs

    networks:
      - app_network

volumes:
  sonarqube_data:
  sonarqube_logs:

networks:
  app_network:
    external: true

