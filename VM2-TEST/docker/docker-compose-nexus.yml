#version: "3.8"

services:

  nexus:
    image: sonatype/nexus3:latest
    container_name: nexus
    restart: unless-stopped

    ports:
      - "8083:8081"

    volumes:
      - nexus_data:/nexus-data

    networks:
      - app_network

volumes:
  nexus_data:

networks:
  app_network:
    external: true

