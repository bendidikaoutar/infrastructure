version: '3.8'

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    networks:
      - monitoring
      - app_network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always

    environment:
      GF_SECURITY_ADMIN_USER: chaimae
      GF_SECURITY_ADMIN_PASSWORD: chaimae1702

      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: "Keycloak"
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"

      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "grafana"
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "irBtJwJVZYaXHNcEhiDqL8T5bRHUYrZV"

      GF_AUTH_GENERIC_OAUTH_SCOPES: "openid profile email roles"

      GF_AUTH_GENERIC_OAUTH_AUTH_URL: "http://100.124.103.20:8081/realms/projet-portfolio/protocol/openid-connect/auth"
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: "http://100.124.103.20:8081/realms/projet-portfolio/protocol/openid-connect/token"
      GF_AUTH_GENERIC_OAUTH_API_URL: "http://100.124.103.20:8081/realms/projet-portfolio/protocol/openid-connect/userinfo"

      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH: "contains(realm_access.roles[*], 'chef-equipe') && 'Admin' || contains(realm_access.roles[*], 'adjoint-chef') && 'Admin' || contains(r>
      GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT: "false"

      GF_SERVER_ROOT_URL: "http://100.124.103.20:3000"

      GF_AUTH_SIGNOUT_REDIRECT_URL: "http://100.124.103.20:8081/realms/projet-portfolio/protocol/openid-connect/logout"

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

    depends_on:
      - prometheus

    networks:
      - monitoring
      - app_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always

    ports:
      - "9100:9100"

    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always

    ports:
      - "8082:8080"


    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro

    networks:
      - monitoring

networks:
  monitoring:
  app_network:
  
volumes:
  grafana_data:
