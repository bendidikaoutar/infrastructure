- name: Setup Docker on DevSecOps VM
  hosts: devsecops
  become: true

  tasks:
    - name: Create /home/****/app directory for docker-compose
      file:
        path: /home/kaoutarbendidi/app/
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: docker-compose-gitlab.yml
        dest: /home/kaoutarbendidi/app/docker-compose.yml

    - name: Run docker compose
      command: docker compose up -d
      args:
        chdir: /home/kaoutarbendidi/app
