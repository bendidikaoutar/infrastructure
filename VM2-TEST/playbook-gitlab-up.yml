- name: Setup Docker on DevSecOps VM
  hosts: devsecops
  become: true
  vars:
    - app_dir: "{{ ansible_user_dir }}/app"

  tasks:
    - name: Create /home/****/app directory for docker-compose
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: docker-compose-gitlab.yml
        dest: "{{ app_dir }}/docker-compose.yml"

    - name: Run docker compose
      command: docker compose up -d
      args:
        chdir: "{{ app_dir }}"
